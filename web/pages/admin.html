<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — INGENIO ARTE & MADERA</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <img src="../IMG/logo.png" alt="Logo" onerror="this.style.display='none'">

    <nav>
      <ul>
        <li><a href="admin.html" class="active"><i class="bi bi-box-seam"></i> Productos</a></li>
        <li><a href="shop.html"><i class="bi bi-shop"></i> Ver Tienda</a></li>
        <li><a href="nosotros.html"><i class="bi bi-info-circle"></i> Nosotros</a></li>
        <li><a href="#" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a></li>
      </ul>
    </nav>

    <footer>by Sebas y Mafe © 2025</footer>
  </aside>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="admin-main">

    <div class="admin-header">
      <h1><i class="bi bi-box-seam"></i> Gestión de Productos</h1>
      <button class="btn-primario" onclick="abrirCrear()">
        <i class="bi bi-plus-lg"></i> Nuevo Producto
      </button>
    </div>

    <!-- Filtros -->
    <div class="filtros">
      <input type="text" id="buscar" placeholder="🔍 Buscar por nombre o descripción...">
      <select id="filtro-estado">
        <option value="">Todos los estados</option>
        <option value="Disponible">Disponible</option>
        <option value="Agotado">Agotado</option>
      </select>
    </div>

    <!-- Tabla de productos -->
    <div class="tabla-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <tr>
            <td colspan="7" style="text-align:center;color:#aaa;padding:30px;">
              Cargando productos...
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<!-- MODAL Crear / Editar -->
<div class="modal-overlay" id="modal-producto">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal()" title="Cerrar">
      <i class="bi bi-x-lg"></i>
    </button>

    <h2 id="modal-titulo">Nuevo Producto</h2>

    <form id="form-producto">

      <div class="form-grupo">
        <label for="inp-nombre">Nombre del producto *</label>
        <input type="text" id="inp-nombre" placeholder="ej: Sillón Valencia" maxlength="120">
        <span class="form-error"></span>
      </div>

      <div class="form-grupo">
        <label for="inp-descripcion">Descripción</label>
        <textarea id="inp-descripcion" rows="2" placeholder="Descripción breve del producto" maxlength="300"></textarea>
        <span class="form-error"></span>
      </div>

      <div class="form-row">
        <div class="form-grupo">
          <label for="inp-precio">Precio (COP) *</label>
          <input type="number" id="inp-precio" placeholder="0" min="0" step="1000">
          <span class="form-error"></span>
        </div>

        <div class="form-grupo">
          <label for="inp-stock">Stock *</label>
          <input type="number" id="inp-stock" placeholder="0" min="0" step="1">
          <span class="form-error"></span>
        </div>
      </div>

      <div class="form-grupo">
        <label for="sel-estado">
          Estado
          <small style="color:#aaa;font-weight:400;">
            — Se asigna automáticamente según el stock
          </small>
        </label>
        <select id="sel-estado">
          <option value="Disponible">Disponible</option>
          <option value="Agotado">Agotado</option>
        </select>
        <span class="form-error"></span>
      </div>

      <p style="font-size:0.78rem;color:#888;margin-top:-8px;">
        <i class="bi bi-info-circle"></i>
        Stock ≤ 0 → Agotado automático &nbsp;|&nbsp; Stock ≥ 3 → Disponible automático
      </p>

      <div class="form-acciones">
        <button type="button" class="btn-secundario" onclick="cerrarModal()">Cancelar</button>
        <button type="submit" class="btn-primario">
          <i class="bi bi-floppy"></i> Guardar
        </button>
      </div>

    </form>
  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
