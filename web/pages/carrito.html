<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito — INGENIO ARTE & MADERA</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/carrito.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    .btn-cant {
      background: #f0ece6;
      border: 1px solid #ddd;
      border-radius: 4px;
      width: 28px;
      height: 28px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 800;
      color: var(--color-primario);
      transition: background 0.2s;
    }
    .btn-cant:hover { background: #e0d8d0; }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <aside>
    <header>
      <img src="../IMG/logo.png" alt="Ingenio Arte y Madera" onerror="this.style.display='none'">
    </header>

    <nav>
      <ul>
        <li>
          <a class="Boton-VOLVER" href="shop.html">
            <i class="bi bi-arrow-return-left"></i> Sigue Comprando
          </a>
        </li>
        <li>
          <a class="Boton-carrito active" href="carrito.html">
            <i class="bi bi-cart-plus-fill"></i> CARRITO
            <span class="numerito">0</span>
          </a>
        </li>
      </ul>
    </nav>

    <footer>
      <p>by Sebas y Mafe © 2025</p>
    </footer>
  </aside>

  <!-- CONTENIDO CARRITO -->
  <main>
    <h2 class="titulo-principal">Tu Carrito</h2>

    <div class="contenedor-carrito" id="contenedor-carrito">

      <!-- Mensaje vacío -->
      <p class="carrito-vacio" id="carrito-vacio" style="display:none;">
        Tu carrito está vacío <i class="bi bi-emoji-frown"></i>
        <br><br>
        <a href="shop.html" style="color:var(--color-primario);font-weight:700;">
          ← Ver productos
        </a>
      </p>

      <!-- Los items se insertan dinámicamente por carrito.js -->

      <!-- Acciones -->
      <div class="carrito-acciones" id="carrito-acciones" style="display:none;">
        <button class="carrito-acciones-vaciar" id="btn-vaciar">
          VACIAR CARRITO
        </button>

        <div class="carrito-acciones-derecha">
          <div class="carrito-acciones-total">
            <p>TOTAL</p>
            <p id="Total">$0</p>
          </div>
          <button class="carrito-acciones-comprar" id="btn-comprar">
            COMPRAR AHORA
          </button>
        </div>
      </div>

    </div>
  </main>

</div>

<script src="../js/utils.js"></script>
<script src="../js/carrito.js"></script>
</body>
</html>
